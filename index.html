<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>BlackS — Crypto Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b10;
  --bg2: #0f1018;
  --bg3: #13141f;
  --card: #161824;
  --card2: #1c1e2e;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --pink: #e040fb;
  --pink2: #f472b6;
  --violet: #7c3aed;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --green: #22c55e;
  --red: #ef4444;
  --text: #f1f0ff;
  --text2: #9091a4;
  --text3: #5c5d75;
  --glow: rgba(224,64,251,0.15);
  --glow2: rgba(124,58,237,0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── AUTH SCREEN ─── */
.auth-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.auth-screen.active { display: flex; }

.auth-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 15%, rgba(124,58,237,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 55% 45% at 85% 85%, rgba(224,64,251,0.14) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(59,130,246,0.06) 0%, transparent 70%);
  pointer-events: none;
}

/* animated particles */
.auth-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(224,64,251,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 20%, rgba(124,58,237,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 70%, rgba(224,64,251,0.25) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 60%, rgba(124,58,237,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 10% 80%, rgba(59,130,246,0.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 10%, rgba(224,64,251,0.35) 0%, transparent 100%);
  background-size: 400px 400px;
  opacity: 0.8;
}

.auth-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  padding: 20px;
}

.auth-card {
  background: rgba(22, 24, 36, 0.9);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border2);
  border-radius: 28px;
  padding: 48px 44px 40px;
  animation: fadeUp 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
}

.auth-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
  margin-bottom: 36px;
}
.auth-logo-text {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 40%, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.auth-logo-text span {
  background: linear-gradient(135deg, var(--pink), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* step indicator */
.auth-steps {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin-bottom: 32px;
}
.auth-step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
  border: 2px solid var(--border2);
  color: var(--text3);
  background: var(--bg3);
  transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position: relative; z-index: 1;
  flex-shrink: 0;
}
.auth-step-dot.done {
  background: linear-gradient(135deg, var(--pink), var(--violet));
  border-color: transparent;
  color: #fff;
  box-shadow: 0 0 16px rgba(224,64,251,0.35);
}
.auth-step-dot.active {
  border-color: var(--pink);
  color: var(--pink);
  box-shadow: 0 0 0 4px rgba(224,64,251,0.12);
}
.auth-step-line {
  width: 48px; height: 2px;
  background: var(--border2);
  position: relative;
}
.auth-step-line .fill {
  position: absolute;
  left: 0; top: 0; height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--pink), var(--violet));
  transition: width 0.5s ease;
  border-radius: 1px;
}
.auth-step-line.done .fill { width: 100%; }

.auth-step-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  margin-bottom: 28px;
  padding: 0 2px;
}
.auth-step-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text3);
  transition: color 0.25s;
  text-align: center;
  flex: 1;
}
.auth-step-label.active { color: var(--pink); }
.auth-step-label.done { color: var(--text2); }

.auth-title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 6px;
  letter-spacing: -0.3px;
}
.auth-sub {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 24px;
  line-height: 1.6;
}

.auth-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.auth-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 16px 18px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.auth-input:focus {
  border-color: rgba(224,64,251,0.55);
  box-shadow: 0 0 0 4px rgba(224,64,251,0.09);
}
.auth-input::placeholder { color: var(--text3); }

/* seed phrase display */
.seed-display-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.seed-word-card {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 10px 10px 10px;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: border-color 0.2s;
  user-select: none;
}
.seed-word-card:hover { border-color: rgba(224,64,251,0.25); }
.sw-num {
  font-size: 9px;
  font-weight: 800;
  color: var(--text3);
  min-width: 12px;
  letter-spacing: 0.5px;
}
.sw-word {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.2px;
}

/* seed confirm inputs */
.seed-confirm-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.sci-wrap { position: relative; }
.sci-num {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  font-weight: 800;
  color: var(--text3);
  pointer-events: none;
  letter-spacing: 0.4px;
}
.sci-input {
  width: 100%;
  background: var(--bg3);
  border: 2px solid var(--border2);
  border-radius: 10px;
  padding: 10px 8px 10px 26px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.sci-input:focus { border-color: rgba(224,64,251,0.5); background: rgba(224,64,251,0.04); }
.sci-input.correct { border-color: rgba(34,197,94,0.5); background: rgba(34,197,94,0.05); }
.sci-input.wrong { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.05); }
.sci-input::placeholder { color: var(--text3); font-size: 11px; }

/* progress bar for seed confirm */
.seed-progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}
.seed-progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--violet), var(--pink));
  border-radius: 2px;
  transition: width 0.3s ease;
}

.seed-paste-all-btn {
  background: rgba(224,64,251,0.1);
  border: 1px solid rgba(224,64,251,0.25);
  border-radius: 8px;
  color: var(--pink);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 5px 11px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.seed-paste-all-btn:hover {
  background: rgba(224,64,251,0.18);
  border-color: rgba(224,64,251,0.45);
}
.btn-ghost-small {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: color 0.2s;
}
.btn-ghost-small:hover { color: var(--text2); }

.auth-notice {
  background: rgba(224,64,251,0.06);
  border: 1px solid rgba(224,64,251,0.18);
  border-radius: 12px;
  padding: 13px 15px;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.65;
  margin-bottom: 20px;
}
.auth-notice.danger {
  background: rgba(239,68,68,0.06);
  border-color: rgba(239,68,68,0.18);
}

.btn-secondary {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: all 0.2s;
  margin-bottom: 10px;
}
.btn-secondary:hover { border-color: rgba(255,255,255,0.18); color: var(--text); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--violet); border-radius: 2px; }

/* ─── LAYOUT ─── */
.app { display: flex; height: 100vh; flex-direction: column; overflow: hidden; }

/* Body below titlebar */
.app-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 72px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
  gap: 6px;
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.logo-icon {
  width: 42px;
  height: 42px;
  margin-bottom: 24px;
}

.logo-icon svg { width: 100%; height: 100%; }

.nav-btn {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  position: relative;
}

.nav-btn:hover { background: var(--card); color: var(--text2); }
.nav-btn.active {
  background: linear-gradient(135deg, rgba(224,64,251,0.2), rgba(124,58,237,0.2));
  color: var(--pink);
  box-shadow: 0 0 16px rgba(224,64,251,0.15);
}

.nav-btn svg { width: 20px; height: 20px; }

.sidebar-spacer { flex: 1; }

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--violet));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
}

/* ─── MAIN ─── */
.main {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* ─── CUSTOM TITLEBAR ─── */
.titlebar {
  height: 40px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  
  user-select: none;
  position: relative;
  z-index: 50;
}

.titlebar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 16px;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.3px;
  background: linear-gradient(135deg, #fff 40%, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.titlebar-logo span {
  background: linear-gradient(135deg, var(--pink), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.titlebar-drag { flex: 1; height: 100%; }

.titlebar-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 12px;
  
}

.titlebar-icon-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  
}
.titlebar-icon-btn:hover { background: var(--card); color: var(--text2); border-color: var(--border2); }
.titlebar-icon-btn svg { width: 14px; height: 14px; }

/* Win controls */
.win-controls {
  display: flex;
  
  margin-left: 4px;
}

.win-btn {
  width: 46px;
  height: 40px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s;
  
}
.win-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.win-btn.close:hover { background: #e81123; color: #fff; }
.win-btn svg { width: 12px; height: 12px; pointer-events: none; }

.notif-dot { position: relative; }
.notif-dot::after {
  content: '';
  position: absolute;
  top: 5px; right: 5px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--pink);
  border: 1.5px solid var(--bg2);
}

/* ─── TOPBAR (page header bar) ─── */
.topbar {
  height: 52px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 10px;
  flex-shrink: 0;
  background: var(--bg2);
}

.topbar-logo {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff 40%, #c4b5fd);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.topbar-logo span {
  background: linear-gradient(135deg, var(--pink), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.topbar-spacer { flex: 1; }

.topbar-icon-btn {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.topbar-icon-btn:hover { border-color: var(--border2); color: var(--text); }
.topbar-icon-btn svg { width: 15px; height: 15px; }

/* ─── PAGE CONTENT ─── */
.page { display: none; flex: 1; overflow-y: auto; padding: 32px 28px 90px; }
.page.active { display: block; }

/* ─── STAKING PAGE ─── */
.hero-section {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  margin-bottom: 36px;
  padding: 40px 48px;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.18) 0%, transparent 70%),
              radial-gradient(ellipse 40% 60% at 80% 50%, rgba(224,64,251,0.1) 0%, transparent 60%),
              var(--bg3);
  border-radius: 20px;
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}

.hero-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='400' height='400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
}

.stat-block { text-align: center; }
.stat-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.stat-value {
  font-size: 30px;
  font-weight: 700;
  letter-spacing: -1px;
}
.stat-value.green { color: var(--green); }

/* APY RING */
.apy-ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  position: relative;
}

.apy-ring {
  width: 160px;
  height: 160px;
  position: relative;
}

.apy-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.apy-ring-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.apy-label { font-size: 10px; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; font-weight: 600; }
.apy-value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.apy-sub { font-size: 12px; color: var(--text2); }

/* ASSETS GRID */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.section-action {
  font-size: 12px;
  color: var(--pink);
  cursor: pointer;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.section-action:hover { text-decoration: underline; }

.assets-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.asset-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 20px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  transition: all 0.25s;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.asset-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}

.asset-card:hover {
  border-color: rgba(224,64,251,0.25);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px rgba(224,64,251,0.05);
}

.asset-card.active-card {
  border-color: rgba(224,64,251,0.3);
  background: linear-gradient(135deg, rgba(224,64,251,0.06), rgba(124,58,237,0.06)), var(--card);
}

.asset-icon {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  margin-bottom: 4px;
  position: relative;
}

.asset-name {
  font-size: 15px;
  font-weight: 700;
  text-align: center;
}
.asset-name span { color: var(--text3); font-weight: 400; font-size: 13px; }

.asset-apy {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -1px;
}

.asset-meta { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); font-weight: 600; }

.asset-earnings {
  font-size: 13px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
}
.asset-earnings.positive { color: var(--pink); }
.asset-earnings.zero { color: var(--text3); }

.asset-btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}

.btn-active {
  background: rgba(255,255,255,0.08);
  color: var(--text2);
}
.btn-active:hover { background: rgba(255,255,255,0.12); }

.btn-start {
  background: linear-gradient(135deg, var(--pink), var(--violet));

  box-shadow: 0 4px 16px rgba(224,64,251,0.3);
}
.btn-start:hover {
  box-shadow: 0 6px 24px rgba(224,64,251,0.45);

}
.btn-manage {
  background: rgba(124,58,237,0.15);
  color: var(--violet);

}
.btn-manage:hover { background: rgba(124,58,237,0.25); transform: translateY(-1px); }

.btn-unstaking {
  background: rgba(255,255,255,0.05);
  color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-unstaking:hover { background: rgba(255,255,255,0.09); }

/* small asset cards (bottom row) */
.assets-grid-sm {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 12px;
}

.asset-card-sm {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.25s;
  cursor: pointer;
}

.asset-card-sm:hover {
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-1px);
}

.asset-card-sm .asset-icon { width: 44px; height: 44px; font-size: 20px; margin-bottom: 0; }

.asset-info-sm .asset-name-sm { font-size: 14px; font-weight: 700; }
.asset-info-sm .asset-name-sm span { color: var(--text3); font-size: 12px; font-weight: 400; }
.asset-info-sm .asset-apy-sm { font-size: 20px; font-weight: 800; margin-top: 2px; }
.asset-arrow { margin-left: auto; color: var(--text3); }

/* ─── PORTFOLIO PAGE ─── */
.portfolio-header {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 28px;
}

.portfolio-stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}

.portfolio-stat-card .label { font-size: 12px; color: var(--text3); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.portfolio-stat-card .value { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.portfolio-stat-card .change { font-size: 13px; font-family: 'Inter', sans-serif; margin-top: 6px; }
.change.up { color: var(--green); }
.change.down { color: var(--red); }

.portfolio-body {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 20px;
}

.chart-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}

.chart-title { font-size: 14px; font-weight: 700; color: var(--text2); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

.chart-tabs { display: flex; gap: 4px; }
.chart-tab {
  padding: 5px 12px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text3);
  transition: all 0.2s;
  border: none;
  background: none;
  font-family: 'Syne', sans-serif;
}
.chart-tab.active { background: var(--card2); color: var(--text); }
.chart-tab:hover:not(.active) { color: var(--text2); }

.portfolio-chart { width: 100%; height: 200px; margin: 8px 0 16px; }

.chart-legend { display: flex; gap: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

.holdings-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}

.holding-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  border-radius: 8px;
  padding-left: 8px;
  padding-right: 8px;
  margin: 0 -8px;
}
.holding-row:last-child { border-bottom: none; }
.holding-row:hover { background: rgba(255,255,255,0.03); }

.holding-icon { width: 36px; height: 36px; border-radius: 50%; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.holding-name { font-size: 14px; font-weight: 700; }
.holding-ticker { font-size: 11px; color: var(--text3); }
.holding-right { margin-left: auto; text-align: right; }
.holding-value { font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; }
.holding-pct { font-size: 12px; font-family: 'Inter', sans-serif; }
.holding-pct.up { color: var(--green); }
.holding-pct.down { color: var(--red); }

/* ─── SEND PAGE ─── */
.send-wrap { max-width: 520px; margin: 0 auto; }
.send-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
  margin-bottom: 20px;
}

.send-title { font-size: 22px; font-weight: 800; margin-bottom: 28px; }

.form-group { margin-bottom: 20px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; display: block; }

.form-input-wrap { position: relative; }

.form-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 16px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-input:focus {
  border-color: rgba(224,64,251,0.5);
  box-shadow: 0 0 0 3px rgba(224,64,251,0.08);
}
.form-input::placeholder { color: var(--text3); }

.form-input-suffix {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 12px;
  font-weight: 700;
  color: var(--pink);
  cursor: pointer;
  font-family: 'Syne', sans-serif;
}

.asset-select {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.asset-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.2s;
  color: var(--text2);
}
.asset-chip.selected {
  border-color: rgba(224,64,251,0.5);
  background: rgba(224,64,251,0.1);
  color: var(--pink);
}
.asset-chip:hover:not(.selected) { border-color: var(--border2); background: rgba(255,255,255,0.05); color: var(--text); }

.fee-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
}
.fee-row:last-child { border-bottom: none; }
.fee-row .val { color: var(--text); font-family: 'Inter', sans-serif; font-weight: 600; }

.btn-primary {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, var(--pink), var(--violet));
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  box-shadow: 0 4px 24px rgba(224,64,251,0.3);
}
.btn-primary:hover {
  box-shadow: 0 6px 32px rgba(224,64,251,0.45);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }

/* ─── RECEIVE PAGE ─── */
.receive-wrap { max-width: 420px; margin: 0 auto; }
.receive-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
}

.receive-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.receive-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

.address-box {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 16px;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--text2);
  word-break: break-all;
  text-align: left;
  position: relative;
  margin-bottom: 16px;
}

.copy-btn {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: 5px 10px;
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.copy-btn:hover { color: var(--pink); border-color: rgba(224,64,251,0.4); }

.chain-selector { display: flex; gap: 8px; flex-wrap: wrap; }
.chain-btn {
  padding: 7px 16px;
  border-radius: 9px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.chain-btn.active { background: rgba(224,64,251,0.12); color: var(--pink); border-color: rgba(224,64,251,0.4); }
.chain-btn:hover:not(.active) { color: var(--text); }

/* ─── HISTORY PAGE ─── */
.history-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 8px 18px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--card);
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn.active {
  background: rgba(224,64,251,0.12);
  color: var(--pink);
  border-color: rgba(224,64,251,0.35);
}
.filter-btn:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,0.15); }

.tx-list { display: flex; flex-direction: column; gap: 8px; }

.tx-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 72px 24px;
  gap: 14px;
  color: var(--text3);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
}
.tx-empty svg { opacity: 0.35; }
.tx-empty-title { font-size: 16px; font-weight: 700; color: var(--text2); }
.tx-empty-sub { font-size: 13px; text-align: center; line-height: 1.7; max-width: 320px; color: var(--text3); }

.tx-row {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.tx-row:hover { border-color: var(--border2); transform: translateX(2px); }

.tx-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.tx-icon.send { background: rgba(239,68,68,0.12); color: var(--red); }
.tx-icon.receive { background: rgba(34,197,94,0.12); color: var(--green); }
.tx-icon.stake { background: rgba(224,64,251,0.12); color: var(--pink); }
.tx-icon.swap { background: rgba(59,130,246,0.12); color: var(--blue); }

.tx-info { flex: 1; min-width: 0; }
.tx-type { font-size: 14px; font-weight: 700; }
.tx-addr { font-size: 12px; color: var(--text3); font-family: 'Inter', sans-serif; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tx-right { text-align: right; flex-shrink: 0; }
.tx-amount { font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; }
.tx-amount.positive { color: var(--green); }
.tx-amount.negative { color: var(--red); }
.tx-date { font-size: 11px; color: var(--text3); margin-top: 3px; }
.tx-status {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 6px;
  margin-top: 5px;
  display: inline-block;
  text-transform: uppercase;
}
.tx-status.confirmed { background: rgba(34,197,94,0.12); color: var(--green); }
.tx-status.pending { background: rgba(251,191,36,0.12); color: #fbbf24; }

/* ─── MARKETS PAGE ─── */
.markets-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 16px;
  flex-wrap: wrap;
}

.markets-tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
}
.markets-tab {
  padding: 7px 16px;
  border-radius: 9px;
  border: none;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  background: transparent;
  color: var(--text3);
  transition: all 0.2s;
}
.markets-tab.active {
  background: linear-gradient(135deg, rgba(224,64,251,0.2), rgba(124,58,237,0.2));
  color: var(--text);
}

.markets-search {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  flex: 1;
  max-width: 260px;
}
.markets-search input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  width: 100%;
}
.markets-search input::placeholder { color: var(--text3); }
.markets-search svg { color: var(--text3); flex-shrink: 0; }

.markets-refresh {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
  font-family: 'Inter', sans-serif;
}
.markets-refresh-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: livePulse 2s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.7); }
}

/* Summary bar */
.markets-summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.mkt-summary-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
}
.mkt-summary-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}
.mkt-summary-value {
  font-size: 17px;
  font-weight: 800;
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.5px;
}

/* Table */
.markets-table-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.markets-table-head {
  display: grid;
  grid-template-columns: 32px 2fr 1.3fr 1fr 1fr 1fr 1fr;
  gap: 0;
  padding: 11px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text3);
}
.mkt-th { cursor: pointer; user-select: none; display: flex; align-items: center; gap: 4px; }
.mkt-th:hover { color: var(--text2); }
.mkt-th.right { justify-content: flex-end; }

.markets-table-body { overflow-y: auto; max-height: calc(100vh - 420px); }

.mkt-row {
  display: grid;
  grid-template-columns: 32px 2fr 1.3fr 1fr 1fr 1fr 1fr;
  gap: 0;
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  cursor: pointer;
  transition: background 0.15s;
}
.mkt-row:last-child { border-bottom: none; }
.mkt-row:hover { background: rgba(255,255,255,0.025); }

.mkt-rank { font-size: 11px; color: var(--text3); font-family: 'Inter', sans-serif; text-align: center; }

.mkt-coin { display: flex; align-items: center; gap: 10px; }
.mkt-coin-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--bg3);
}
.mkt-coin-name { font-size: 14px; font-weight: 700; }
.mkt-coin-ticker { font-size: 11px; color: var(--text3); font-family: 'Inter', sans-serif; text-transform: uppercase; }

.mkt-price {
  font-size: 14px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  text-align: right;
}
.mkt-change {
  font-size: 13px;
  font-weight: 700;
  font-family: 'Inter', sans-serif;
  text-align: right;
}
.mkt-change.up   { color: var(--green); }
.mkt-change.down { color: var(--red);   }

.mkt-mcap, .mkt-vol, .mkt-high, .mkt-low {
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  color: var(--text2);
  text-align: right;
}

/* Sparkline */
.mkt-spark { display: flex; align-items: center; justify-content: flex-end; }
.mkt-spark svg { width: 80px; height: 32px; }

/* Loading skeleton */
.mkt-skeleton {
  height: 16px;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--bg3) 25%, rgba(255,255,255,0.04) 50%, var(--bg3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.markets-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 12px;
  color: var(--text3);
}

/* ─── SETTINGS PAGE ─── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

.settings-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
}
.settings-card-title { font-size: 15px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.settings-card-title svg { color: var(--pink); }

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 16px;
}
.setting-row:last-child { border-bottom: none; }

.setting-label { font-size: 13px; font-weight: 600; }
.setting-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

.toggle {
  width: 42px;
  height: 24px;
  border-radius: 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  cursor: pointer;
  position: relative;
  transition: background 0.2s;
  flex-shrink: 0;
}
.toggle.on { background: linear-gradient(135deg, var(--pink), var(--violet)); border-color: transparent; }
.toggle::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  transition: left 0.2s, background 0.2s;
}
.toggle.on::after { left: 21px; background: #fff; }

.setting-select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 6px 10px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  outline: none;
  cursor: pointer;
}

.settings-action-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.settings-action-btn:hover { border-color: rgba(255,255,255,0.18); color: var(--text); background: rgba(255,255,255,0.05); }
.settings-action-btn.settings-action-danger { color: var(--red); border-color: rgba(239,68,68,0.2); background: rgba(239,68,68,0.06); }
.settings-action-btn.settings-action-danger:hover { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.1); }

/* ─── SWAP PAGE ─── */
.swap-wrap { max-width: 480px; margin: 0 auto; }
.swap-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 16px;
}

.swap-box {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 8px;
}
.swap-box-top { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3); margin-bottom: 10px; font-weight: 600; }
.swap-box-main { display: flex; align-items: center; gap: 12px; }
.swap-amount { flex: 1; font-size: 28px; font-weight: 800; background: none; border: none; outline: none; color: var(--text); font-family: 'Syne', sans-serif; }
.swap-amount::placeholder { color: var(--text3); }

.swap-token-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  transition: all 0.2s;
  white-space: nowrap;
}
.swap-token-btn:hover { border-color: rgba(224,64,251,0.4); }

.swap-arrow-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  cursor: pointer;
  margin: 4px auto;
  position: relative;
  z-index: 1;
  transition: all 0.2s;
}
.swap-arrow-btn:hover { border-color: rgba(224,64,251,0.4); background: rgba(224,64,251,0.08); }

.swap-info { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
.swap-info-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); padding: 4px 0; }
.swap-info-row .val { font-family: 'Inter', sans-serif; color: var(--text); }

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 32px;
  width: 100%;
  max-width: 420px;
  position: relative;
  animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.92) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s;
}
.modal-close:hover { color: var(--text); border-color: var(--border2); }

.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

/* toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 600;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 200;
  pointer-events: none;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* ─── REFERRAL PAGE ─── */
.ref-hero {
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.18) 0%, transparent 70%),
              radial-gradient(ellipse 50% 40% at 80% 80%, rgba(224,64,251,0.12) 0%, transparent 60%),
              var(--bg3);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 36px 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  margin-bottom: 20px;
}
.ref-hero-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
.ref-hero-sub { font-size: 14px; color: var(--text2); line-height: 1.6; max-width: 360px; }
.ref-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
.ref-stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 20px; text-align: center;
}
.ref-stat-val { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.ref-stat-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-top: 4px; }
.ref-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 24px 28px; margin-bottom: 16px; }
.ref-card-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.promo-display {
  background: var(--bg3); border: 1.5px dashed rgba(124,58,237,0.4); border-radius: 14px;
  padding: 20px 24px; text-align: center; margin-bottom: 16px;
}
.promo-code {
  font-size: 28px; font-weight: 800; letter-spacing: 6px; font-family: 'Inter', monospace;
  background: linear-gradient(135deg, #fff 30%, #c4b5fd); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
}
.promo-empty { font-size: 14px; color: var(--text3); padding: 8px 0; }
.ref-input-row { display: flex; gap: 10px; }
.ref-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px;
  padding: 13px 16px; color: var(--text); font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 2px; outline: none;
  text-transform: uppercase; transition: border-color 0.2s;
}
.ref-input:focus { border-color: rgba(124,58,237,0.5); }
.ref-input::placeholder { color: var(--text3); font-weight: 400; letter-spacing: 0; text-transform: none; }
.ref-status { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-top: 12px; }
.ref-status.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--green); }
.ref-status.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.2);  color: var(--red); }
.ref-rules { display: flex; flex-direction: column; gap: 10px; }
.ref-rule { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; }
.ref-rule-num { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--violet), var(--pink)); color: #fff; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ref-rule-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.ref-rule-desc  { font-size: 12px; color: var(--text2); line-height: 1.5; }

/* animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-6px); }
  40%      { transform: translateX(6px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}

.page.active > * { animation: fadeUp 0.35s ease both; }
.page.active > *:nth-child(2) { animation-delay: 0.06s; }
.page.active > *:nth-child(3) { animation-delay: 0.12s; }
.page.active > *:nth-child(4) { animation-delay: 0.18s; }

/* ring animation */
@keyframes dash {
  from { stroke-dashoffset: 440; }
  to { stroke-dashoffset: 0; }
}

.ring-progress { animation: dash 1.4s ease both; }

/* responsive */
@media (max-width: 1100px) {
  .assets-grid { grid-template-columns: repeat(2, 1fr); }
  .portfolio-body { grid-template-columns: 1fr; }
  .settings-grid { grid-template-columns: 1fr; }
}

/* Page titles */
.page-title {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 24px;
}
.page-title span { color: var(--pink); }

/* ─── TELEGRAM WEB APP — MOBILE OVERRIDES ─── */

/* Hide Electron titlebar entirely */
.titlebar { display: none !important; }

/* Fix height — use CSS var set by JS from Telegram.WebApp */
.app {
  height: var(--tg-viewport-height, 100dvh);
  height: 100dvh;
}

/* Hide desktop sidebar */
.sidebar { display: none !important; }

/* Main takes full width */
.app-body { flex-direction: column; }
.main {
  width: 100% !important;
  padding-bottom: 70px; /* space for bottom nav */
}

/* ─── BOTTOM NAV BAR ─── */
.bottom-nav {
  display: flex;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  z-index: 200;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  height: calc(60px + env(safe-area-inset-bottom, 0px));
}
.bottom-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  border: none;
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: color 0.15s;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.bottom-nav-btn svg { width: 20px; height: 20px; }
.bottom-nav-btn.active { color: var(--pink); }
.bottom-nav-btn span { line-height: 1; }

/* More menu overlay */
.more-menu {
  display: none;
  position: fixed;
  bottom: calc(60px + env(safe-area-inset-bottom, 0px));
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0;
  z-index: 199;
  padding: 12px 8px;
  flex-wrap: wrap;
  gap: 4px;
}
.more-menu.open { display: flex; }
.more-menu-btn {
  flex: 0 0 calc(25% - 4px);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border: none;
  background: var(--card);
  border-radius: 12px;
  color: var(--text2);
  cursor: pointer;
  padding: 12px 4px;
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  transition: background 0.15s, color 0.15s;
}
.more-menu-btn svg { width: 20px; height: 20px; }
.more-menu-btn:active { background: var(--card2); color: var(--pink); }
.more-menu-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 198;
  background: transparent;
}
.more-menu-overlay.open { display: block; }

/* Fix toast position above bottom nav */
.toast {
  bottom: calc(70px + env(safe-area-inset-bottom, 0px)) !important;
  right: 12px !important;
  left: 12px !important;
  width: auto !important;
}

/* Fix modal safe area */
.modal {
  margin: 12px;
  max-height: calc(100dvh - 100px);
  overflow-y: auto;
}

/* Fix auth card padding on small screens */
@media (max-height: 700px) {
  .auth-card { padding: 28px 24px 24px; }
  .auth-logo { margin-bottom: 20px; }
}
@media (max-width: 400px) {
  .auth-card { padding: 32px 20px 28px; border-radius: 20px; }
}

/* Scrollable pages */
.page { overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* Hide scrollbars */
.page::-webkit-scrollbar { display: none; }
.page { scrollbar-width: none; }

/* Safe area top padding */
.main { padding-top: env(safe-area-inset-top, 0px); }

/* Tighten page padding on small screens */
@media (max-width: 480px) {
  .page { padding: 20px 16px 90px; }
  .page-title { font-size: 20px; margin-bottom: 16px; }
  .hero-section { padding: 16px; }
  .stat-block { padding: 12px 16px; }
  .assets-grid { grid-template-columns: 1fr; gap: 10px; }
  .modal { border-radius: 20px 20px 0 0; position: fixed; bottom: 0; left: 0; right: 0; margin: 0; max-height: 80dvh; }
  .modal-overlay { align-items: flex-end; }
}
</style>
